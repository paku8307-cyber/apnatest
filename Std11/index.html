<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STD 12 | LEARN X PRO</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --bg:#060912; --card-bg:#0d1426; --border:#1e2d50; --accent:#3b82f6; --accent2:#8b5cf6; --text:#e2e8f0; --muted:#64748b; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Syne',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
    body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(59,130,246,0.04) 1px,transparent 1px), linear-gradient(90deg,rgba(59,130,246,0.04) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
    nav { position:sticky; top:0; z-index:100; background:rgba(6,9,18,0.85); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); padding:14px 5%; display:flex; justify-content:space-between; align-items:center; }
    .logo { display:flex; align-items:center; gap:10px; font-size:1.1rem; font-weight:800; background:linear-gradient(135deg,var(--accent),var(--accent2)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
    .logo img { width:32px; height:32px; border-radius:50%; border:2px solid var(--accent); }
    .breadcrumb { font-family:'Space Mono',monospace; font-size:0.75rem; color:var(--muted); display:flex; align-items:center; gap:8px; }
    .breadcrumb a { color:var(--accent); text-decoration:none; } .breadcrumb a:hover { text-decoration:underline; }

    .hero { position:relative; z-index:1; text-align:center; padding:50px 5% 30px; }
    .std-badge { display:inline-block; background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; font-weight:800; font-size:2.5rem; width:70px; height:70px; border-radius:16px; line-height:70px; margin-bottom:15px; }
    .hero h1 { font-size:clamp(1.8rem,5vw,2.8rem); font-weight:800; background:linear-gradient(135deg,#fff 40%,var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin-bottom:8px; }
    .hero p { color:var(--muted); font-family:'Space Mono',monospace; font-size:0.8rem; }

    .section-title { position:relative; z-index:1; text-align:center; font-size:0.7rem; letter-spacing:4px; text-transform:uppercase; color:var(--muted); font-family:'Space Mono',monospace; margin-bottom:30px; }
    .section-title span { color:var(--accent); }

    .subject-grid { position:relative; z-index:1; display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:20px; max-width:900px; margin:0 auto 60px; padding:0 5%; }
    .subject-card { background:var(--card-bg); border:1px solid var(--border); border-radius:20px; padding:35px 25px; text-align:center; cursor:pointer; transition:all 0.3s; text-decoration:none; display:block; position:relative; overflow:hidden; }
    .subject-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; transform:scaleX(0); transition:transform 0.3s; }
    .physics::before { background:linear-gradient(90deg,#3b82f6,#06b6d4); }
    .chemistry::before { background:linear-gradient(90deg,#8b5cf6,#ec4899); }
    .biology::before { background:linear-gradient(90deg,#10b981,#84cc16); }
    .subject-card:hover { transform:translateY(-6px); }
    .physics:hover { border-color:#3b82f6; }
    .chemistry:hover { border-color:#8b5cf6; }
    .biology:hover { border-color:#10b981; }
    .subject-card:hover::before { transform:scaleX(1); }
    .subject-icon { font-size:3rem; margin-bottom:15px; }
    .subject-card h2 { font-size:1.3rem; font-weight:700; margin-bottom:6px; }
    .subject-card p { color:var(--muted); font-size:0.8rem; font-family:'Space Mono',monospace; }
    .subject-card .tag { display:inline-block; margin-top:15px; padding:4px 12px; border-radius:20px; font-size:0.7rem; font-family:'Space Mono',monospace; }
    .physics .tag { background:rgba(59,130,246,0.15); color:#3b82f6; border:1px solid rgba(59,130,246,0.3); }
    .chemistry .tag { background:rgba(139,92,246,0.15); color:#8b5cf6; border:1px solid rgba(139,92,246,0.3); }
    .biology .tag { background:rgba(16,185,129,0.15); color:#10b981; border:1px solid rgba(16,185,129,0.3); }

    footer { position:relative; z-index:1; text-align:center; padding:25px; color:var(--muted); font-size:0.7rem; font-family:'Space Mono',monospace; border-top:1px solid var(--border); }
  </style>
</head>
<body>

<nav>
  <div class="logo">
    <img src="https://i.ibb.co/Q152gXX/x.jpg" alt="logo">
    𝙅𝙀𝙀 𝙉𝙀𝙀𝙏 𝙂𝙐𝙅
  </div>
  <div class="breadcrumb">
    <a href="../index.html">Home</a> › <span>STD 12</span>
  </div>
</nav>

<section class="hero">
  <div class="std-badge">12</div>
  <h1>Standard 12</h1>
  <p>Select your subject to start practicing</p>
</section>

<p class="section-title">— Choose Your <span>Subject</span> —</p>

<div class="subject-grid">
  <a href="physics/index.html" class="subject-card physics">
    <div class="subject-icon">📘</div>
    <h2>Physics</h2>
    <p>Chapter-wise tests & topics</p>
    <div class="tag">PHY →</div>
  </a>
  <a href="chemistry/index.html" class="subject-card chemistry">
    <div class="subject-icon">🧪</div>
    <h2>Chemistry</h2>
    <p>Chapter-wise tests & topics</p>
    <div class="tag">CHEM →</div>
  </a>
  <a href="biology/index.html" class="subject-card biology">
    <div class="subject-icon">🌿</div>
    <h2>Biology</h2>
    <p>Chapter-wise tests & topics</p>
    <div class="tag">BIO →</div>
  </a>
</div>

<footer>© 2025 LEARN X PRO — STD 12</footer>
</body>
</html>
