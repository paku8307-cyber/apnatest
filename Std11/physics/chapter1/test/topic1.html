<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapter 1 Test - ભૌતિક જગત</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#060912;
    color:white;
    padding:20px;
}

.container{
    max-width:700px;
    margin:auto;
    background:#0d1426;
    padding:25px;
    border-radius:15px;
}

h1{
    text-align:center;
    color:#8b5cf6;
}

.question{
    margin-top:25px;
}

.option{
    display:block;
    margin:10px 0;
    padding:12px;
    background:#111c35;
    border-radius:8px;
    cursor:pointer;
}

button{
    margin-top:20px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#8b5cf6;
    color:white;
    font-size:16px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h1>અધ્યાય 1 : ભૌતિક જગત</h1>

<div class="question">
<h3>1. ભૌતિકશાસ્ત્ર મુખ્યત્વે કયા વિષયનો અભ્યાસ કરે છે?</h3>

<label class="option">
<input type="radio" name="q1" value="0">
વનસ્પતિ અને પ્રાણીઓ
</label>

<label class="option">
<input type="radio" name="q1" value="1">
પદાર્થ, ઊર્જા અને તેમની પરસ્પર ક્રિયાઓ
</label>

<label class="option">
<input type="radio" name="q1" value="0">
માત્ર રસાયણિક પ્રક્રિયાઓ
</label>

<label class="option">
<input type="radio" name="q1" value="0">
માત્ર માનવ શરીર
</label>

<button onclick="checkAnswer()">જવાબ તપાસો</button>

<div id="result"></div>

</div>

</div>

<script>
function checkAnswer(){
    let ans=document.querySelector('input[name="q1"]:checked');

    if(!ans){
        alert("કૃપા કરીને એક વિકલ્પ પસંદ કરો");
        return;
    }

    if(ans.value=="1"){
        document.getElementById("result").innerHTML=
        "✅ સાચો જવાબ!";
    }else{
        document.getElementById("result").innerHTML=
        "❌ ખોટો જવાબ<br><br>સાચો જવાબ: પદાર્થ, ઊર્જા અને તેમની પરસ્પર ક્રિયાઓ";
    }
}
</script>

</body>
</html>
